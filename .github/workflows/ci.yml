name: CI/CD Validation

# Runs on every PR to main. Branch protection on main prevents direct pushes.
# Fork maintainers: add any other branches you want protected, or extend
# validation to additional example configs.
on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Test and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pyyaml requests

      - name: Run Ruff Linter
        run: ruff check scripts/

      - name: Run Python unit tests
        run: |
          PYTHONPATH=scripts pytest tests/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9'

      - name: Verify Terraform Formatting
        run: terraform fmt -check -recursive

      - name: "Validate Example: Compliance Only"
        run: |
          cd examples/compliance-only
          terraform init -backend=false
          terraform validate

      - name: "Validate Example: Foundation Only"
        run: |
          cd examples/foundation-only
          terraform init -backend=false
          terraform validate

      - name: "Validate Example: Full Stack"
        run: |
          cd examples/full-stack
          terraform init -backend=false
          terraform validate

      - name: Validate individual foundation modules
        run: |
          for dir in modules/foundation/*/; do
            basename="$(basename "$dir")"
            # _shared is a snippet library, not a standalone module
            [ "$basename" = "_shared" ] && continue
            echo "Validating $dir"
            (cd "$dir" && terraform init -backend=false && terraform validate)
          done
