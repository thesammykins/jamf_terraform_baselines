name: Foundation Module Update

on:
  schedule:
    - cron: '0 6 1-7 * 1'          # Monthly first Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: foundation-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Update PPPC bundle IDs
        run: |
          python scripts/update_pppc_bundle_ids.py

      - name: Check for provider version bumps
        run: |
          # Check deploymenttheory/jamfpro latest version vs pinned
          LATEST=$(curl -s https://api.github.com/repos/deploymenttheory/terraform-provider-jamfpro/releases/latest | jq -r .tag_name | sed 's/^v//')
          echo "Latest jamfpro provider: ${LATEST}"
          # Write to file for PR body if changed
          echo "Latest jamfpro provider: ${LATEST}" > foundation-update-changelog.md

      - name: Check if changes detected
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "foundation: monthly module update"
          body-path: foundation-update-changelog.md
          branch: "auto/foundation-update"
          labels: "foundation,automated"
