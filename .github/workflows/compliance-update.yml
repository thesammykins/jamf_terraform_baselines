name: Compliance Baseline Update

# Fork maintainers: enable this by adding push/PR triggers if you want
# automatic compliance module regeneration. The schedule and dispatch
# keep it opt-in in the upstream repo.
on:
  schedule:
    - cron: '0 6 1 */3 *'          # Quarterly on the 1st of Jan/Apr/Jul/Oct 06:00 UTC
  workflow_dispatch:
    inputs:
      mscp_branch:
        description: 'mSCP branch to process'
        required: false
        default: 'all'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: compliance-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-releases:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.detect.outputs.branches }}
      sonoma_tag: ${{ steps.detect.outputs.sonoma_tag }}
      sequoia_tag: ${{ steps.detect.outputs.sequoia_tag }}
      tahoe_tag: ${{ steps.detect.outputs.tahoe_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Detect new mSCP releases
        id: detect
        run: |
          python scripts/detect_mscp_releases.py \
            --state-file .ci/mscp-revision-state.json \
            --output new-releases.json

          # Set step outputs for downstream jobs
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json

          with open("new-releases.json", encoding="utf-8") as f:
              data = json.load(f)

          # Branches with new releases (for matrix)
          releases = data.get("new_releases", [])
          branches = [r["branch"] for r in releases]
          print(f"branches={json.dumps(branches)}")

          # Per-branch latest tags (for checkout in generate job)
          for branch, tag in data.get("branches", {}).items():
              print(f"{branch}_tag={tag}")
          PY

      - name: Upload revision state
        uses: actions/upload-artifact@v4
        with:
          name: mscp-revision-state
          path: .ci/mscp-revision-state.json

  generate:
    needs: detect-releases
    if: needs.detect-releases.outputs.branches != '[]'
    strategy:
      matrix:
        branch: ${{ fromJSON(needs.detect-releases.outputs.branches) }}
    runs-on: ubuntu-latest
    container: ghcr.io/usnistgov/mscp_2.0:latest
    steps:
      - uses: actions/checkout@v7

      - name: Download revision state
        uses: actions/download-artifact@v4
        with:
          name: mscp-revision-state
          path: .ci

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9'
          terraform_wrapper: false

      - name: Clone mSCP at release tag
        run: |
          git clone -b ${{ matrix.branch }} https://github.com/usnistgov/macos_security.git /tmp/mscp
          cd /tmp/mscp
          git checkout ${{ needs.detect-releases.outputs[format('{0}_tag', matrix.branch)] }}

      - name: Generate compliance modules
        run: |
          python scripts/generate_tf_compliance.py \
            --mscp-path /tmp/mscp \
            --output modules/compliance \
            --branch ${{ matrix.branch }}

      - name: Generate changelog
        run: |
          python scripts/generate_changelog.py \
            --mscp-path /tmp/mscp \
            --branch ${{ matrix.branch }} \
            --summary-output changelog-summary.md

      - name: Verify generated PR artifacts
        run: |
          test -f .ci/mscp-revision-state.json
          test -f .ci/mscp-rule-state.json
          test -f changelog-summary.md
          test -n "$(find docs/compliance-changelogs -name '${{ matrix.branch }}_*.md' -print -quit)"

      - name: Terraform validate
        run: |
          for dir in modules/compliance/*/macos_*/; do
            (cd "$dir" && terraform init -backend=false && terraform validate)
          done

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          title: "compliance: ${{ matrix.branch }} baseline update"
          body-path: changelog-summary.md
          branch: "auto/compliance-${{ matrix.branch }}"
          labels: "compliance,automated"
          add-paths: |
            .ci/mscp-revision-state.json
            .ci/mscp-rule-state.json
            docs/compliance-changelogs
            modules/compliance
