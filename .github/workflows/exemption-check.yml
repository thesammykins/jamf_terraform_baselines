name: Exemption Validation

# Disabled by default upstream (intended as a template repo). Fork
# maintainers: add push/PR triggers here to enforce exemption hygiene
# on your own branches.
on:
  workflow_dispatch:
    description: 'Check exemption expiry dates and completeness across all modules'

permissions:
  contents: read

concurrency:
  group: exemption-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-exemptions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml python-hcl2

      - name: Check for expired exemptions
        run: |
          python scripts/check_exemptions.py \
            --modules-dir modules/ \
            --enforce-expiry true

      - name: Check exemption completeness
        run: |
          python scripts/check_exemptions.py \
            --modules-dir modules/ \
            --require-ticket true \
            --warn-missing-reviewer true
